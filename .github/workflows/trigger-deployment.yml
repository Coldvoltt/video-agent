name: Deploy Video Agent 

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'frontend/**'
      - '.github/workflows/trigger-deployment.yml'

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  EC2_USER: ubuntu
  BACKEND_PATH: /var/www/video-agent/backend
  FRONTEND_PATH: /var/www/video-agent/app

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout
      - name: Checkout code
        uses: actions/checkout@v4

      # 2️⃣ Configure AWS via OIDC
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::236076836769:role/OIDC
          aws-region: ${{ env.AWS_REGION }}

      # 3️⃣ Setup SSH
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.DEPLOY_SSH_HOST }} >> ~/.ssh/known_hosts

      # 4️⃣ Create backend .env
      - name: Create backend .env
        run: |
          echo "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}" >> backend/.env
          

      # 5️⃣ Copy backend
      - name: Copy backend to EC2
        run: |
          ssh -i ~/.ssh/deploy_key ${{ env.EC2_USER }}@${{ secrets.DEPLOY_SSH_HOST }} << 'EOF'
            sudo mkdir -p ${{ env.BACKEND_PATH }}
            sudo chown -R $USER:$USER ${{ env.BACKEND_PATH }}
          EOF

          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            ./backend/ \
            ${{ env.EC2_USER }}@${{ secrets.DEPLOY_SSH_HOST }}:${{ env.BACKEND_PATH }}/

      # 6️⃣ Copy frontend
      - name: Copy frontend to EC2
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            ./frontend/ \
            ${{ env.EC2_USER }}@${{ secrets.DEPLOY_SSH_HOST }}:/tmp/frontend/

      # 7️⃣ Deploy on EC2
      - name: Deploy application
        run: |
          ssh -i ~/.ssh/deploy_key ${{ env.EC2_USER }}@${{ secrets.DEPLOY_SSH_HOST }} << 'EOF'
            set -e

            echo "===== BACKEND DEPLOY ====="
            cd ${{ env.BACKEND_PATH }}

            if [ ! -d ".venv" ]; then
              python3 -m venv .venv
            fi

            source .venv/bin/activate
            pip install -r requirements.txt

            sudo pkill -f "uvicorn.*api:app" || true
            sleep 2

            nohup bash -c "
              cd ${{ env.BACKEND_PATH }} &&
              set -a &&
              source .env &&
              set +a &&
              source .venv/bin/activate &&
              uvicorn api:app --host 0.0.0.0 --port 8000 --workers 2
            " > /tmp/backend.log 2>&1 &

            echo "===== FRONTEND BUILD ====="
            cd /tmp/frontend
            npm install
            npm run build

            sudo rm -rf ${{ env.FRONTEND_PATH }}/*
            sudo cp -r dist/* ${{ env.FRONTEND_PATH }}/

            sudo systemctl reload nginx

            echo "Deployment complete"
          EOF

      # 8️⃣ Verify
      - name: Verify backend
        run: |
          ssh -i ~/.ssh/deploy_key ${{ env.EC2_USER }}@${{ secrets.DEPLOY_SSH_HOST }} << 'EOF'
            sleep 5
            if pgrep -f "uvicorn.*api:app" > /dev/null; then
              echo "✅ Backend running"
              curl -f http://localhost:8000/docs || true
            else
              echo "❌ Backend failed"
              tail -50 /tmp/backend.log
              exit 1
            fi
          EOF