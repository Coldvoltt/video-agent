name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Write YouTube cookies file to EC2
        run: |
          ssh -o StrictHostKeyChecking=no ubuntu@${{ secrets.DEPLOY_SSH_HOST }} "cat > ~/video-agent/backend/cookies.txt" <<< "$YOUTUBE_COOKIES"
        env:
          YOUTUBE_COOKIES: ${{ secrets.YOUTUBE_COOKIES }}

      - name: Deploy to EC2
        run: |
          echo "=== Starting deployment on EC2 ==="

          ssh -o StrictHostKeyChecking=no ubuntu@${{ secrets.DEPLOY_SSH_HOST }} << 'EOF'
            set -e
            echo "Pulling latest changes..."
            cd ~/video-agent
            git reset --hard
            git clean -fd
            git pull origin main

            echo "Installing backend dependencies..."
            cd backend
            source venv/bin/activate
            pip install --upgrade pip
            pip install -r requirements.txt

            echo "Configuring YTDLP_COOKIES_FILE in systemd service..."
            if ! grep -q 'YTDLP_COOKIES_FILE' /etc/systemd/system/fastapi.service; then
              sudo sed -i "/^\[Service\]/a Environment=YTDLP_COOKIES_FILE=/home/ubuntu/video-agent/backend/cookies.txt" /etc/systemd/system/fastapi.service
              sudo systemctl daemon-reload
            fi

            echo "Cleaning old frontend build..."
            rm -rf ~/video-agent/frontend/dist
            cd ~/video-agent/frontend
            npm install
            npm run build

            echo "Restarting services..."
            sudo systemctl restart fastapi
            sudo systemctl restart nginx

            echo "=== Deployment complete! ==="
          EOF